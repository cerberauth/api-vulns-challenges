name: Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed challenges
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi

          COMMON_CHANGED=$(echo "$CHANGED" | grep "^common/" | wc -l)

          MATRIX=()
          for challenge in $(ls challenges/); do
            if [ "${BUILD_ALL:-false}" = "true" ]; then
              MATRIX+=("$challenge")
              continue
            fi

            CHALLENGE_CHANGED=$(echo "$CHANGED" | grep "^challenges/$challenge/" | wc -l)

            if [ "$CHALLENGE_CHANGED" -gt 0 ]; then
              MATRIX+=("$challenge")
            elif [ "$COMMON_CHANGED" -gt 0 ] && grep -q "COPY common/" "challenges/$challenge/Dockerfile"; then
              MATRIX+=("$challenge")
            fi
          done

          if [ ${#MATRIX[@]} -eq 0 ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$(printf '%s\n' "${MATRIX[@]}" | jq -R . | jq -c -s .)" >> $GITHUB_OUTPUT
          fi

  docker-lint:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        challenge: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: cerberauth/ci/actions/docker-lint@main
        with:
          dockerfile: ./challenges/${{ matrix.challenge }}/Dockerfile

  docker-build-push:
    needs: [detect-changes, docker-lint]
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest

    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        challenge: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./challenges/${{ matrix.challenge }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/cerberauth/api-vulns-challenges/${{ matrix.challenge }}:latest
          cache-from: type=registry,ref=ghcr.io/cerberauth/api-vulns-challenges/${{ matrix.challenge }}:latest
          cache-to: type=inline
